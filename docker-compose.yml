services:
  app:
    build:
      context: ./sys_beneficiarios
      dockerfile: Dockerfile
    container_name: sys_beneficiarios_app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sys_beneficiarios_local
      DB_USERNAME: sys_ipj
      DB_PASSWORD: sys_ipj
      API_TJ_BASE_URL: http://host.docker.internal:8080
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      OCR_INE_SERVICE_URL: http://ocr-ine:8001
      OCR_INE_API_KEY: ${OCR_INE_API_KEY:-change-me-in-production}
    volumes:
      - ./sys_beneficiarios:/var/www/html
      # Isolar dirs de escritura a volúmenes nombrados
      - storage_data:/var/www/html/storage
      - cache_data:/var/www/html/bootstrap/cache
    restart: unless-stopped
    networks:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql:
    image: mysql:8.4
    container_name: sys_beneficiarios_mysql
    environment:
      MYSQL_DATABASE: sys_beneficiarios_local
      MYSQL_USER: sys_ipj
      MYSQL_PASSWORD: sys_ipj
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - backend

  ocr-ine:
    build:
      context: ./OCR_INE
      dockerfile: Dockerfile
    container_name: sys_beneficiarios_ocr_ine
    environment:
      API_KEY: ${OCR_INE_API_KEY:-change-me-in-production}
    ports:
      - "8001:8001"
    restart: unless-stopped
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: sys_beneficiarios_nginx
    ports:
      - "80:80"
    volumes:
      - ./sys_beneficiarios:/var/www/html:ro
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - backend

  node:
    image: node:20-alpine
    container_name: sys_beneficiarios_node
    working_dir: /var/www/html
    command: sh -c "tail -f /dev/null"
    ports:
      - "5175:5173"
    volumes:
      - ./sys_beneficiarios:/var/www/html
      - node_modules:/var/www/html/node_modules
    restart: unless-stopped
    networks:
      - backend

volumes:
  storage_data:
  cache_data:
  mysql_data:
  node_modules:

networks:
  backend:
    driver: bridge
