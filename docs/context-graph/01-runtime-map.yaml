project:
  repo: INPOJUVE-DEV/Sys_IPJ
  name: Sys_IPJ
  product: Sys IPJ 2025
  type: web_application
  primary_domain: beneficiary_management

runtime:
  backend:
    framework: Laravel 11
    language: PHP 8.2
    app_root: sys_beneficiarios/
  frontend:
    stack:
      - Blade
      - Bootstrap 5
      - Vite
    node_runtime: Node 20
  database:
    engine: MySQL
    mode: external_server
  web_server:
    type: Nginx
    public_root: sys_beneficiarios/public
  containers:
    - app_php_fpm
    - nginx
    - node

auth:
  authentication: Laravel Breeze
  authorization: Spatie Permission
  audit: Spatie Activitylog

docker:
  compose_file: docker-compose.yml
  nginx_config: .docker/nginx/default.conf
  env_file: sys_beneficiarios/.env
  env_example: sys_beneficiarios/.env.example

commands:
  setup:
    - php artisan key:generate
    - php artisan migrate --seed
    - npm install
    - npm run build
  cache_prod:
    - php artisan config:cache
    - php artisan route:cache
    - php artisan view:cache
  tests:
    - php artisan test

operational_notes:
  - project_does_not_start_local_mysql_container
  - database_credentials_point_to_external_mysql
  - storage_and_bootstrap_cache_are_persistent_volumes
