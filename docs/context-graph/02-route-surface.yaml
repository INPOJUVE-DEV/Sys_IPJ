route_surfaces:
  admin:
    prefixes:
      - /admin
    responsibilities:
      - dashboard
      - kpis
      - users
      - beneficiaries
      - exports
      - catalogs

  capturista:
    prefixes:
      - /capturista
      - /mis-registros
    responsibilities:
      - capture_beneficiaries
      - manage_personal_progress
      - manage_assigned_records

  encargado_360:
    prefixes:
      - /s360/enc360
    responsibilities:
      - assignments
      - dashboard
      - operational_supervision

  api_public:
    prefixes:
      - /api
    responsibilities:
      - seccional_lookup
    rate_limited: true

shared_resources:
  beneficiaries:
    allowed_roles:
      - admin
      - capturista

  domicilios:
    allowed_roles:
      - admin
      - capturista

documentation:
  references:
    - docs/rutas.md
    - docs/api.md
