integration:
  external_system:
    - API_TJ

principles:
  - Sys_IPJ_is_source_of_truth_for_beneficiaries
  - API_TJ_should_not_duplicate_full_operational_logic
  - CURP_is_primary_cross_system_identifier

flows:
  beneficiary_validation:
    steps:
      - API_TJ_requests_beneficiary_validation
      - Sys_IPJ_validates_CURP_or_registration
      - response_returns_minimum_required_data

  staging_flow:
    steps:
      - external_payload_arrives_to_API_TJ
      - payload_enters_staging
      - admin_reviews_payload
      - validated_data_is_pushed_or_synced

  account_creation:
    steps:
      - beneficiary_exists_in_Sys_IPJ
      - API_TJ_creates_local_credentials
      - linked_by_CURP

security:
  requirements:
    - controlled_external_access
    - scoped_integrations
    - auditability
    - minimum_required_data_exchange
